name: F-Droid Update Metadata

# ── Trigger ───────────────────────────────────────────────────────────────
# Runs automatically when the Android release build completes successfully,
# or manually via workflow_dispatch.
#
# This workflow ONLY generates the build entries and pushes them to the
# fdroiddata fork. A separate workflow (fdroid-create-mr.yml) handles the
# GitLab MR creation so each concern can be debugged independently.
on:
  workflow_run:
    workflows: ["Build Android and Upload Release APKs"]
    types: [completed]
  workflow_dispatch:

# Prevent parallel pushes to fdroiddata from racing each other.
concurrency: fdroid-metadata-push

jobs:
  update-fdroid:
    name: Update F-Droid metadata and create MR
    runs-on: ubuntu-latest
    # Only run on build success OR manual dispatch (skip failures).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      actions: read

    env:
      # ── Secrets the user must configure before first run ──────────────────
      # FDROID_DATA_SSH_KEY  — private SSH deploy key for git@gitlab.com:gmag11/fdroiddata.git
      # ── Hardcoded constants ──────────────────────────────────────────────
      FDROID_FDROIDDATA_PROJECT_ID: "36528"        # fdroid/fdroiddata GitLab project ID
      FDROID_APP_ID: "net.gmartin.pocket2fa"       # F-Droid application ID
      FDROID_FORK_REPO: "git@gitlab.com:gmag11/fdroiddata.git"
      FDROID_BRANCH: "net.gmartin.pocket2fa"
      NDK_VERSION: "28.2.13676358"

    steps:
      # ──────────────────────────────────────────────────────────────────────
      # 1. Checkout the Pocket2FA source repo
      # ──────────────────────────────────────────────────────────────────────
      - name: Checkout Pocket2FA source
        uses: actions/checkout@v6

      # ──────────────────────────────────────────────────────────────────────
      # 2. Extract version information from pubspec.yaml
      # ──────────────────────────────────────────────────────────────────────
      - name: Extract version information
        id: version
        shell: bash
        run: |
          set -euo pipefail

          # versionName: "X.Y.Z" from "version: X.Y.Z+CODE"
          VERSION_NAME=$(sed -n -E 's/^version: ([0-9.]+)\+[0-9]+$/\1/p' pubspec.yaml)
          # versionCode: "CODE" from "version: X.Y.Z+CODE"
          VERSION_CODE=$(sed -n -E 's/^version: [0-9.]+\+([0-9]+)$/\1/p' pubspec.yaml)

          if [[ -z "$VERSION_NAME" || -z "$VERSION_CODE" ]]; then
            echo "❌ Failed to extract version from pubspec.yaml"
            exit 1
          fi

          echo "versionName=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "versionCode=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "✅ Version: ${VERSION_NAME}+${VERSION_CODE}"

      # ──────────────────────────────────────────────────────────────────────
      # 3. Capture commit SHA
      # ──────────────────────────────────────────────────────────────────────
      - name: Capture commit SHA
        id: commit
        shell: bash
        run: |
          COMMIT_SHA="${{ github.sha }}"
          echo "sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "✅ Commit: ${COMMIT_SHA:0:10}"

      # ──────────────────────────────────────────────────────────────────────
      # 4. Compute per-ABI version codes
      #    armeabi-v7a = base × 10 + 1
      #    arm64-v8a   = base × 10 + 2
      #    x86_64      = base × 10 + 3
      # ──────────────────────────────────────────────────────────────────────
      - name: Compute per-ABI version codes
        id: abi-codes
        shell: bash
        run: |
          BASE="${{ steps.version.outputs.versionCode }}"
          echo "armv7=$(( BASE * 10 + 1 ))" >> "$GITHUB_OUTPUT"
          echo "arm64=$(( BASE * 10 + 2 ))" >> "$GITHUB_OUTPUT"
          echo "x86_64=$(( BASE * 10 + 3 ))" >> "$GITHUB_OUTPUT"

      # ──────────────────────────────────────────────────────────────────────
      # 5. Extract Flutter version from the CI workflow
      #    Same approach the F-Droid build server recipe uses.
      # ──────────────────────────────────────────────────────────────────────
      - name: Extract Flutter version from CI workflow
        id: flutter
        shell: bash
        run: |
          FLUTTER_VERSION=$(sed -n -E "s/.*flutter-version: '(.*)'/\1/p" .github/workflows/release-build-android.yml)
          if [[ -z "$FLUTTER_VERSION" ]]; then
            echo "❌ Failed to extract Flutter version from release-build-android.yml"
            exit 1
          fi
          echo "version=${FLUTTER_VERSION}" >> "$GITHUB_OUTPUT"
          echo "✅ Flutter: ${FLUTTER_VERSION}"

      # ──────────────────────────────────────────────────────────────────────
      # 6. Set up SSH for GitLab fdroiddata push
      # ──────────────────────────────────────────────────────────────────────
      - name: Set up SSH for GitLab
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.FDROID_DATA_SSH_KEY }}

      - name: Verify SSH connectivity to GitLab
        shell: bash
        run: |
          ssh -T -o StrictHostKeyChecking=accept-new git@gitlab.com 2>&1 || true
          echo "✅ SSH connectivity to GitLab verified"

      # ──────────────────────────────────────────────────────────────────────
      # 7. Clone the fdroiddata fork
      # ──────────────────────────────────────────────────────────────────────
      - name: Clone fdroiddata fork
        shell: bash
        run: |
          git clone \
            --depth 5 \
            --branch "$FDROID_BRANCH" \
            "$FDROID_FORK_REPO" \
            /tmp/fdroiddata
          echo "✅ Cloned fdroiddata fork (branch: ${FDROID_BRANCH})"

      # ──────────────────────────────────────────────────────────────────────
      # 8. Check if build entries for this version already exist
      # ──────────────────────────────────────────────────────────────────────
      - name: Check for existing build entries
        id: check-existing
        shell: bash
        run: |
          VERSION_NAME="${{ steps.version.outputs.versionName }}"
          METADATA_FILE="/tmp/fdroiddata/metadata/${FDROID_APP_ID}.yml"

          if grep -q "versionName: ${VERSION_NAME}" "$METADATA_FILE" 2>/dev/null; then
            echo "⚠️  Build entries for v${VERSION_NAME} already exist — nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "✅ No existing entries for v${VERSION_NAME} — will generate."
          fi

      # ──────────────────────────────────────────────────────────────────────
      # 9. Generate and append new build entries
      # ──────────────────────────────────────────────────────────────────────
      - name: Generate build entries
        if: steps.check-existing.outputs.exists != 'true'
        id: generate
        shell: bash
        run: |
          VERSION_NAME="${{ steps.version.outputs.versionName }}"
          VERSION_CODE="${{ steps.version.outputs.versionCode }}"
          COMMIT_SHA="${{ steps.commit.outputs.sha }}"
          FLUTTER_VERSION="${{ steps.flutter.outputs.version }}"
          METADATA_FILE="/tmp/fdroiddata/metadata/${FDROID_APP_ID}.yml"

          ARM_V7_CODE="${{ steps.abi-codes.outputs.armv7 }}"
          ARM64_CODE="${{ steps.abi-codes.outputs.arm64 }}"
          X86_64_CODE="${{ steps.abi-codes.outputs.x86_64 }}"

          # F-Droid expects %v placeholder in binary URLs, not a literal version.
          BINARY_BASE="https://github.com/gmag11/Pocket2FA/releases/download/%v"

          # ── Save and strip the footer block ──────────────────────────────
          # F-Droid metadata files end with global keys (AllowedAPKSigningKeys,
          # AutoUpdateMode, CurrentVersion, etc.) that must stay BELOW all
          # Builds: entries. cat >> blindly appends after them, so we save
          # the footer first, strip it, append new entries, then re-append
          # the footer with updated CurrentVersion/CurrentVersionCode.
          FOOTER_START_LINE=$(grep -n '^AllowedAPKSigningKeys:' "$METADATA_FILE" | head -1 | cut -d: -f1)
          if [[ -n "$FOOTER_START_LINE" ]]; then
            FOOTER=$(sed -n "${FOOTER_START_LINE},\$ p" "$METADATA_FILE")
            sed -i "${FOOTER_START_LINE},\$ d" "$METADATA_FILE"
          else
            FOOTER=""
          fi

          cat >> "$METADATA_FILE" << YAML_ENTRIES

            - versionName: ${VERSION_NAME}
              versionCode: ${ARM_V7_CODE}
              commit: ${COMMIT_SHA}
              sudo:
                - mkdir -p /home/runner/work/Pocket2FA/
                - chown vagrant /home/runner/work/Pocket2FA/
              output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
              binary: 
                ${BINARY_BASE}/app-armeabi-v7a-release.apk
              srclibs:
                - flutter@stable
              prebuild:
                - flutterVersion=\$(sed -n -E "s/.*flutter-version:\\ '(.*)'/\\1/p" .github/workflows/release-build-android.yml)
                - '[[ \$flutterVersion ]]'
                - git -C \$\$flutter\$\$ checkout -f \$flutterVersion
                - export repo=/home/runner/work/Pocket2FA/Pocket2FA
                - cd ..
                - mv net.gmartin.pocket2fa \$repo
                - pushd \$repo
                - export PUB_CACHE=\$(pwd)/.pub-cache
                - \$\$flutter\$\$/bin/flutter config --no-analytics
                - \$\$flutter\$\$/bin/flutter pub get
                - popd
                - mv \$repo net.gmartin.pocket2fa
              scanignore:
                - .pub-cache
              build:
                - export repo=/home/runner/work/Pocket2FA/Pocket2FA
                - cd ..
                - mv net.gmartin.pocket2fa \$repo
                - pushd \$repo
                - export PUB_CACHE=\$(pwd)/.pub-cache
                - \$\$flutter\$\$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm
                - popd
                - mv \$repo net.gmartin.pocket2fa
              ndk: ${NDK_VERSION}

            - versionName: ${VERSION_NAME}
              versionCode: ${ARM64_CODE}
              commit: ${COMMIT_SHA}
              sudo:
                - mkdir -p /home/runner/work/Pocket2FA/
                - chown vagrant /home/runner/work/Pocket2FA/
              output: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
              binary: 
                ${BINARY_BASE}/app-arm64-v8a-release.apk
              srclibs:
                - flutter@stable
              prebuild:
                - flutterVersion=\$(sed -n -E "s/.*flutter-version:\\ '(.*)'/\\1/p" .github/workflows/release-build-android.yml)
                - '[[ \$flutterVersion ]]'
                - git -C \$\$flutter\$\$ checkout -f \$flutterVersion
                - export repo=/home/runner/work/Pocket2FA/Pocket2FA
                - cd ..
                - mv net.gmartin.pocket2fa \$repo
                - pushd \$repo
                - export PUB_CACHE=\$(pwd)/.pub-cache
                - \$\$flutter\$\$/bin/flutter config --no-analytics
                - \$\$flutter\$\$/bin/flutter pub get
                - popd
                - mv \$repo net.gmartin.pocket2fa
              scanignore:
                - .pub-cache
              build:
                - export repo=/home/runner/work/Pocket2FA/Pocket2FA
                - cd ..
                - mv net.gmartin.pocket2fa \$repo
                - pushd \$repo
                - export PUB_CACHE=\$(pwd)/.pub-cache
                - \$\$flutter\$\$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm64
                - popd
                - mv \$repo net.gmartin.pocket2fa
              ndk: ${NDK_VERSION}

            - versionName: ${VERSION_NAME}
              versionCode: ${X86_64_CODE}
              commit: ${COMMIT_SHA}
              sudo:
                - mkdir -p /home/runner/work/Pocket2FA/
                - chown vagrant /home/runner/work/Pocket2FA/
              output: build/app/outputs/flutter-apk/app-x86_64-release.apk
              binary: ${BINARY_BASE}/app-x86_64-release.apk
              srclibs:
                - flutter@stable
              prebuild:
                - flutterVersion=\$(sed -n -E "s/.*flutter-version:\\ '(.*)'/\\1/p" .github/workflows/release-build-android.yml)
                - '[[ \$flutterVersion ]]'
                - git -C \$\$flutter\$\$ checkout -f \$flutterVersion
                - export repo=/home/runner/work/Pocket2FA/Pocket2FA
                - cd ..
                - mv net.gmartin.pocket2fa \$repo
                - pushd \$repo
                - export PUB_CACHE=\$(pwd)/.pub-cache
                - \$\$flutter\$\$/bin/flutter config --no-analytics
                - \$\$flutter\$\$/bin/flutter pub get
                - popd
                - mv \$repo net.gmartin.pocket2fa
              scanignore:
                - .pub-cache
              build:
                - export repo=/home/runner/work/Pocket2FA/Pocket2FA
                - cd ..
                - mv net.gmartin.pocket2fa \$repo
                - pushd \$repo
                - export PUB_CACHE=\$(pwd)/.pub-cache
                - \$\$flutter\$\$/bin/flutter build apk --release --split-per-abi --target-platform=android-x64
                - popd
                - mv \$repo net.gmartin.pocket2fa
              ndk: ${NDK_VERSION}
          YAML_ENTRIES

          # ── Re-append footer with updated version fields ─────────────────
          if [[ -n "$FOOTER" ]]; then
            FOOTER=$(echo "$FOOTER" | sed "s/^CurrentVersion: .*/CurrentVersion: ${VERSION_NAME}/")
            FOOTER=$(echo "$FOOTER" | sed "s/^CurrentVersionCode: .*/CurrentVersionCode: ${X86_64_CODE}/")
            # Ensure a blank line separates builds from footer.
            echo "" >> "$METADATA_FILE"
            echo "$FOOTER" >> "$METADATA_FILE"
          fi

          echo "✅ Generated 3 build entries for v${VERSION_NAME}"

      # ──────────────────────────────────────────────────────────────────────
      # 10. Commit and push to fdroiddata fork
      # ──────────────────────────────────────────────────────────────────────
      - name: Commit and push to fdroiddata
        if: steps.check-existing.outputs.exists != 'true'
        id: push
        shell: bash
        run: |
          VERSION_NAME="${{ steps.version.outputs.versionName }}"
          VERSION_CODE="${{ steps.version.outputs.versionCode }}"
          COMMIT_SHA="${{ steps.commit.outputs.sha }}"
          cd /tmp/fdroiddata

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "metadata/${FDROID_APP_ID}.yml"
          git commit -m "feat: add build entries for v${VERSION_NAME}" || {
            echo "⚠️  Nothing to commit (file unchanged)"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          }

          git push origin "$FDROID_BRANCH"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

          PUSHED_COMMIT_URL="https://gitlab.com/gmag11/fdroiddata/-/commit/$(git rev-parse HEAD)"
          echo "commit_url=${PUSHED_COMMIT_URL}" >> "$GITHUB_OUTPUT"
          echo "✅ Pushed to fdroiddata: ${PUSHED_COMMIT_URL}"

          # Write version info JSON for the downstream MR workflow artifact.
          python3 -c "
          import json
          data = {
              'versionName': '${VERSION_NAME}',
              'versionCode': '${VERSION_CODE}',
              'commitSha': '${COMMIT_SHA}'
          }
          with open('/tmp/fdroid-version-info.json', 'w') as f:
              json.dump(data, f)
          "
          echo "✅ Version artifact written to /tmp/fdroid-version-info.json"

      # ──────────────────────────────────────────────────────────────────────
      # 11. Verify the push (quick sanity check)
      # ──────────────────────────────────────────────────────────────────────
      - name: Verify metadata after push
        if: steps.push.outputs.pushed == 'true'
        shell: bash
        run: |
          VERSION_NAME="${{ steps.version.outputs.versionName }}"
          # Quick clone to verify the new entries are there
          rm -rf /tmp/fdroiddata-verify
          git clone --depth 5 --branch "$FDROID_BRANCH" "$FDROID_FORK_REPO" /tmp/fdroiddata-verify
          if grep -q "versionName: ${VERSION_NAME}" "/tmp/fdroiddata-verify/metadata/${FDROID_APP_ID}.yml"; then
            echo "✅ Verified: build entries for v${VERSION_NAME} are in the remote"
          else
            echo "❌ Verification failed: entries not found in remote"
            exit 1
          fi

      # ──────────────────────────────────────────────────────────────────────
      # 12. Upload version artifact for downstream MR workflow
      # ──────────────────────────────────────────────────────────────────────
      - name: Upload version artifact
        if: steps.push.outputs.pushed == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: fdroid-version-info
          path: /tmp/fdroid-version-info.json
          retention-days: 1

      # ──────────────────────────────────────────────────────────────────────
      # 13. Workflow summary
      # ──────────────────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        shell: bash
        run: |
          VERSION_NAME="${{ steps.version.outputs.versionName }}"
          VERSION_CODE="${{ steps.version.outputs.versionCode }}"
          COMMIT_SHA="${{ steps.commit.outputs.sha }}"

          echo "### F-Droid Metadata Update — v${VERSION_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${VERSION_NAME}+${VERSION_CODE} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${COMMIT_SHA:0:10}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flutter | ${{ steps.flutter.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ steps.check-existing.outputs.exists }}" == "true" ]]; then
            echo "| Status | ⚠️ Build entries already exist — nothing to do |" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.push.outputs.pushed }}" == "true" ]]; then
            echo "| Push | [${{ steps.push.outputs.commit_url }}](${{ steps.push.outputs.commit_url }}) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Artifact | ✅ Uploaded — triggers ‘F-Droid Create MR’ workflow |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Status | ⚠️ No changes to push |" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Metadata file:** [metadata/${FDROID_APP_ID}.yml](https://gitlab.com/gmag11/fdroiddata/-/blob/${FDROID_BRANCH}/metadata/${FDROID_APP_ID}.yml)" >> "$GITHUB_STEP_SUMMARY"
