name: Build Windows and Create Installer

on:
  release:
    types: [published]

jobs:
  windows:
    name: Build Windows and create installer
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Fetch Flutter dependencies
        run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Locate or install Inno Setup 6
        shell: powershell
        run: |
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          if (Test-Path $iscc) {
            Write-Host "Found pre-installed ISCC at $iscc"
            exit 0
          }

          Write-Host 'ISCC not found — downloading Inno Setup...'
          $url = 'https://jrsoftware.org/download.php/is.exe?site=1'
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              Write-Host "Download attempt $i of $maxRetries"
              Invoke-WebRequest -Uri $url -OutFile is.exe -ErrorAction Stop
              $size = (Get-Item is.exe).Length
              if ($size -lt 1MB) { throw "Downloaded file too small ($size bytes) — likely corrupted" }
              Write-Host "Downloaded $size bytes — looks healthy"
              break
            } catch {
              Write-Host "Attempt $i failed: $_"
              if ($i -eq $maxRetries) { throw "All $maxRetries download attempts failed" }
              Start-Sleep -Seconds 5
            }
          }

          Write-Host 'Installing Inno Setup silently...'
          Start-Process -FilePath .\is.exe -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/SP-','/DIR="C:\Program Files (x86)\Inno Setup 6"' -Wait -NoNewWindow

          if (-not (Test-Path $iscc)) {
            Write-Error "ISCC.exe not found at $iscc after install"
            exit 1
          }
          Write-Host "ISCC installed successfully at $iscc"

      - name: Build installer (PowerShell script)
        shell: powershell
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          .\scripts\build_and_package.ps1

      - name: Verify installer exists
        shell: powershell
        run: |
          $installer = Resolve-Path -Path "windows\installer\Output\Pocket2FA_Installer_Windows_x64.exe" -ErrorAction SilentlyContinue
          if (-not $installer) {
            Write-Error "Installer not found at windows\\installer\\Output\\Pocket2FA_Installer_Windows_x64.exe"
            exit 1
          }
          Write-Host "Installer found: $($installer.Path)"

      - name: Upload installer to release
        uses: softprops/action-gh-release@v3
        with:
          files: windows/installer/Output/Pocket2FA_Installer_Windows_x64.exe
          token: ${{ secrets.TOKEN }}
