# The description shown on the F-Droid website.
# Keep it plain text or use supported HTML: <b>, <i>, <u>, <a href="">, <p>, <ul>, <li>.
Description: |-
  Pocket2FA is a native Android client for the
  <a href="https://github.com/Bubka/2FAuth">2FAuth</a> self-hosted two-factor
  authentication server. It generates TOTP and Steam OTP codes locally on your
  device while synchronising with your own 2FAuth instance.

  <b>Features</b>
  <ul>
  <li>TOTP and Steam OTP code generation — secrets stay on-device</li>
  <li>Encrypted storage using Android Keystore</li>
  <li>Optional biometric authentication (fingerprint / face recognition)</li>
  <li>Real-time code refresh with countdown timer</li>
  <li>Privacy mode: hide codes by default, reveal with long-press</li>
  <li>One-tap copy to clipboard</li>
  <li>Group organisation for easy browsing</li>
  <li>Service icon support</li>
  <li>QR code scanning via camera or gallery image (ZXing, Apache 2.0)</li>
  <li>Multiple 2FAuth server support</li>
  </ul>

  <i>Requires a self-hosted 2FAuth instance.</i>

