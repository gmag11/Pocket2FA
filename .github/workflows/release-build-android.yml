name: Build Android and Upload Release APKs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
        type: string

jobs:
  android:
    name: Build Android and upload APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set up Java 17
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.1'
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Fetch Flutter dependencies
        run: flutter pub get

      - name: Patch flutter_zxing for reproducible builds
        shell: bash
        run: |
          sed -i '1a add_link_options("LINKER:--build-id=none")' "$PUB_CACHE"/hosted/pub.dev/flutter_zxing-*/*/CMakeLists.txt
          sed -i '1a add_compile_options("-ffile-prefix-map=${CMAKE_SOURCE_DIR}=.")' "$PUB_CACHE"/hosted/pub.dev/flutter_zxing-*/*/CMakeLists.txt

      - name: Detect KEYSTORE_BASE64 presence
        id: detect_keystore
        shell: bash
        run: |
          if [[ -n "${{ secrets.KEYSTORE_BASE64 }}" ]]; then
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download keystore
        if: steps.detect_keystore.outputs.has_keystore == 'true'
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      - name: Set signing environment variables
        if: steps.detect_keystore.outputs.has_keystore == 'true'
        shell: bash
        run: |
          cd android/app
          chmod 600 keystore.jks
          # Use absolute path from app directory
          echo "KEYSTORE_PATH=$(pwd)/keystore.jks" >> "$GITHUB_ENV"
          cd ../..
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Build split-per-ABI APKs
        shell: bash
        run: flutter build apk --release --split-per-abi

      - name: Save split APKs before clean
        shell: bash
        run: |
          mkdir -p /tmp/apk-split
          cp build/app/outputs/flutter-apk/app-*-release.apk /tmp/apk-split/

      - name: Clean build cache between APK builds
        shell: bash
        run: flutter clean && flutter pub get

      - name: Build universal APK (all ABIs in one)
        shell: bash
        run: flutter build apk --release

      - name: Restore split APKs to output directory
        shell: bash
        run: cp /tmp/apk-split/*.apk build/app/outputs/flutter-apk/

      - name: Verify APKs were built
        shell: bash
        run: |
          echo "Checking for built APKs..."
          ls -lh build/app/outputs/flutter-apk/

      - name: Rename APKs and prepare dist
        shell: bash
        run: |
          set -e
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/app-arm64-v8a-release.apk || true
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/app-armeabi-v7a-release.apk || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk dist/app-x86_64-release.apk || true
          cp build/app/outputs/flutter-apk/app-release.apk dist/app-universal-release.apk || true

      - name: Upload APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: dist/
          retention-days: 7

      - name: Upload APKs to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            dist/app-arm64-v8a-release.apk
            dist/app-armeabi-v7a-release.apk
            dist/app-x86_64-release.apk
            dist/app-universal-release.apk
          token: ${{ secrets.TOKEN }}
